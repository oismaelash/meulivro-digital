services:
  postgres:
    image: postgres:16-alpine
    command: ["postgres", "-p", "45432"]
    environment:
      POSTGRES_DB: bookwise
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "45432:45432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -p 45432"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - DOTNET_USE_POLLING_FILE_WATCHER=1
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=45432;Database=bookwise;Username=postgres;Password=postgres
      - DeepSeek__ApiKey=${DEEPSEEK_API_KEY}
      - Anthropic__ApiKey=${ANTHROPIC_API_KEY}
      - PilotStatus__ApiKey=${PILOT_STATUS_API_KEY}
      - PilotStatus__TemplateId=${PILOT_STATUS_TEMPLATE_ID}
      - Auth__Google__ClientId=${GOOGLE_CLIENT_ID}
      - Cors__AllowedOrigins=http://localhost:4000
    ports:
      - "5000:8080"
    volumes:
      - ./backend:/src
      - api_nuget_cache:/root/.nuget/packages
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      - VITE_API_URL=http://localhost:5000/api/v1
      - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
      - CHOKIDAR_USEPOLLING=1
    ports:
      - "4000:4000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 4000"
    depends_on:
      - api

volumes:
  postgres_data_dev:
  api_nuget_cache:
  frontend_node_modules:
