services:
  postgres:
    image: postgres:16-alpine
    command: ["postgres", "-p", "45432"]
    environment:
      POSTGRES_DB: bookwise
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "45432:45432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -p 45432"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=45432;Database=bookwise;Username=postgres;Password=postgres
      - DeepSeek__ApiKey=${DEEPSEEK_API_KEY}
      - Anthropic__ApiKey=${ANTHROPIC_API_KEY}
      - PilotStatus__ApiKey=${PILOT_STATUS_API_KEY}
      - PilotStatus__TemplateId=${PILOT_STATUS_TEMPLATE_ID}
      - Auth__Google__ClientId=${GOOGLE_CLIENT_ID}
      - Cors__AllowedOrigins=http://localhost:4000
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
    ports:
      - "4000:80"
    depends_on:
      - api

volumes:
  postgres_data_prod:
