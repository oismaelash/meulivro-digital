services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bookwise
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "75432:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=bookwise;Username=postgres;Password=postgres
      - DeepSeek__ApiKey=${DEEPSEEK_API_KEY}
      - Anthropic__ApiKey=${ANTHROPIC_API_KEY}
      - Cors__AllowedOrigins=http://localhost:6000
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
    ports:
      - "6000:80"
    depends_on:
      - api

volumes:
  postgres_data_prod:
